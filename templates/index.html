<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ETIQUETAS PARA GOOGLE (SEO) -->
    <meta name="description" content="Analizador de Autenticidad de Medios. Verifica si un video o audio es original o ha sido editado.">
    <meta name="keywords" content="analizador de videos, deepfakes, verificar autenticidad, detector de edición">
    
    <title>Analizador de Autenticidad de Medios</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 40px 20px; background-color: #f0f2f5; margin: 0; }
        .upload-container { background: white; padding: 40px 30px; border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: #1c1e21; margin-top: 0; }
        p { color: #606770; font-size: 15px; margin-bottom: 25px; }
        input[type="file"] { display: none; }
        .custom-file-btn { display: inline-block; background-color: #1877f2; color: white; padding: 14px 28px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .custom-file-btn:hover { background-color: #166fe5; }
        #file-info, #status { margin-top: 20px; font-size: 14px; word-break: break-all; }
        #status { font-weight: 600; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="upload-container">
    <h2>Verificador de Medios</h2>
    <p>Selecciona un video o un audio de tu dispositivo para verificar su autenticidad.</p>

    <input type="file" id="mediaInput" accept="video/*, audio/*">
    <label for="mediaInput" class="custom-file-btn">📁 Buscar Video o Audio</label>

    <div id="file-info"></div>
    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('mediaInput');
    const fileInfo = document.getElementById('file-info');
    const statusDisplay = document.getElementById('status');

    fileInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            fileInfo.innerHTML = `<strong>Archivo:</strong> ${file.name} (${(file.size / (1024*1024)).toFixed(2)} MB)`;
            statusDisplay.style.color = "#1877f2";
            statusDisplay.innerHTML = "🔄 Enviando a Python para análisis...";

            // Conexión real con tu archivo app.py
            const formData = new FormData();
            formData.append('file', file);

            fetch('/analizar', { method: 'POST', body: formData })
            .then(response => response.json())
            .then(data => {
                statusDisplay.style.color = "#2e7d32";
                statusDisplay.innerHTML = `✅ ${data.mensaje}<br><strong>Resultado:</strong> ${data.es_original ? 'Parece Original' : 'Posible Edición detectada'}`;
            })
            .catch(error => {
                statusDisplay.style.color = "#d32f2f";
                statusDisplay.innerHTML = "❌ Error de conexión con el servidor.";
            });
        }
    });
</script>
</body>
</html>
